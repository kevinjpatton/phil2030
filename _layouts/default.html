<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | PHIL 2030</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        bgSoft: '#FCFBF8', 
                        textMain: '#57534E', 
                        textDark: '#292524', 
                        primary: '#D97757', 
                        primaryHover: '#BE6346', 
                        cardBg: '#FFFFFF',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

    <nav class="fixed w-full top-0 z-50 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-display font-bold text-xl tracking-tight text-textDark flex items-center gap-2">
                <div class="w-8 h-8 bg-primary text-white rounded-lg flex items-center justify-center text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"></circle><line x1="12" y1="2" x2="12" y2="22"></line></svg>
                </div>
                PHIL 2030
            </div>
            
            <div id="nav-links" class="hidden md:flex flex-col md:flex-row absolute md:static top-[72px] md:top-0 left-0 w-full md:w-auto bg-white/95 md:bg-transparent backdrop-blur-md md:backdrop-blur-none border-b md:border-none border-slate-100 p-4 md:p-0 gap-2 shadow-sm md:shadow-none items-stretch md:items-center text-sm transition-all duration-300">
                <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %} text-left md:text-center">Syllabus</a>
                <a href="{{ '/schedule' | relative_url }}" class="nav-link {% if page.url == '/schedule.html' %}active{% endif %} text-left md:text-center">Schedule</a>
                <a href="{{ '/resources' | relative_url }}" class="nav-link {% if page.url == '/resources.html' %}active{% endif %} text-left md:text-center">Resources</a>
            </div>

            <button onclick="toggleMobileMenu()" class="md:hidden text-textMain hover:bg-slate-100 p-2 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 pt-32 pb-20 w-full">
        {{ content }}
    </main>

    <footer class="border-t border-slate-200 mt-auto bg-white">
        <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm font-bold text-slate-400">© 2026 Dr. Kevin J. Patton. All rights reserved.</p>
            <div class="flex gap-6 text-sm font-bold text-slate-400">
                <a href="https://www.unomaha.edu/college-of-arts-and-sciences/philosophy/index.php" class="hover:text-primary transition-colors">Department Info</a>
                <a href="https://www.unomaha.edu/accessibility-statement-assistance.php" class="hover:text-primary transition-colors">Accessibility Statement</a>
            </div>
        </div>
    </footer>

    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('nav-links');
            nav.classList.toggle('hidden');
            nav.classList.toggle('flex');
        }
    </script>
</body>
</html>
